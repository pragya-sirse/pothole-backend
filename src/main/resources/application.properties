server.port=${PORT:8080}
spring.application.name=pothole-backend
server.forward-headers-strategy=framework

# Sirf placeholders use karein, apna real password yahan mat likhein
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jackson.serialization.write-dates-as-timestamps=false
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

app.jwt.secret=${APP_JWT_SECRET:pothole_detection_mp_secret_key_2025}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:test@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:testpass}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

cloudinary.cloud-name=${CLOUDINARY_NAME:your_cloud}
cloudinary.api-key=${CLOUDINARY_KEY:your_key}
cloudinary.api-secret=${CLOUDINARY_SECRET:your_secret}

ml.service.url=${ML_SERVICE_URL:http://localhost:5000}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

logging.level.com.pothole=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
spring.jackson.serialization.fail-on-empty-beans=false

spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true