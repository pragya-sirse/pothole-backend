
# ============================================================
# SERVER
# ============================================================
server.port=${PORT:8080}
spring.application.name=pothole-backend

# ============================================================
# DATABASE -
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/pothole_detection_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA
# ============================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ============================================================
# JWT
# ============================================================
app.jwt.secret=${APP_JWT_SECRET:pothole_detection_mp_secret_key_2025_indore_bhopal}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# ============================================================
# EMAIL
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:potholemp.notify@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ============================================================
# CLOUDINARY
# ============================================================
cloudinary.cloud-name=${CLOUDINARY_NAME:your_cloud_name}
cloudinary.api-key=${CLOUDINARY_KEY:your_api_key}
cloudinary.api-secret=${CLOUDINARY_SECRET:your_api_secret}

# ============================================================
# ML SERVICE
# ============================================================
ml.service.url=${ML_SERVICE_URL:http://localhost:5000/detect}

# ============================================================
# FILE UPLOAD
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ============================================================
# LOGGING -
# ============================================================
logging.level.com.pothole=INFO
logging.level.org.springframework.security=WARN
