# ============================================================
# SERVER
# ============================================================
server.port=${PORT:8080}
spring.application.name=pothole-backend

# ============================================================
# DATABASE (Cloud SQL / External MySQL)
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ============================================================
# JPA
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ============================================================
# JWT
# ============================================================
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# ============================================================
# EMAIL (Gmail SMTP)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ============================================================
# CLOUDINARY
# ============================================================
cloudinary.cloud-name=${CLOUDINARY_NAME}
cloudinary.api-key=${CLOUDINARY_KEY}
cloudinary.api-secret=${CLOUDINARY_SECRET}

# ============================================================
# ML SERVICE (External URL)
# ============================================================
ml.service.url=${ML_SERVICE_URL}

# ============================================================
# FILE UPLOAD
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# CORS (Frontend URL)
# ============================================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
server.forward-headers-strategy=framework

# ============================================================
# LOGGING
# ============================================================
logging.level.com.pothole=INFO
logging.level.org.springframework.security=WARN